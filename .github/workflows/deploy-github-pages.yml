# Temporary Astro deploy to GitHub Pages until production DNS (Namecheap → Vercel etc.).
#
# One-time repo setup:
# 1. Settings → Pages → Build and deployment → Source: GitHub Actions
# 2. If Pages already has Custom domain "spdcalpoly.com" but DNS isn't pointed here yet,
#    either remove it temporarily or expect that URL to fail until DNS works — the
#    *.github.io URL should still serve this workflow's output.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build Astro
        run: npm run build
        env:
          SITE_URL: ${{ steps.pages.outputs.base_url }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
